<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Moon/night glow -->
  <circle cx="135" cy="45" r="20" fill="#1e2040" opacity="0.6"/>
  <circle cx="137" cy="43" r="16" fill="#252850" opacity="0.4"/>
  <!-- Baby icon (simplified sleeping baby) -->
  <!-- Head -->
  <circle cx="90" cy="78" r="22" fill="none" stroke="#e8e0f0" stroke-width="2.5" opacity="0.85"/>
  <!-- Closed eyes (sleeping) -->
  <path d="M80 75 Q83 78 86 75" fill="none" stroke="#e8e0f0" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M94 75 Q97 78 100 75" fill="none" stroke="#e8e0f0" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Smile -->
  <path d="M85 85 Q90 89 95 85" fill="none" stroke="#e8e0f0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Blanket/body -->
  <path d="M58 95 Q90 88 122 95 L128 130 Q90 138 52 130 Z" fill="#e8e0f0" opacity="0.12" stroke="#e8e0f0" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Zzz -->
  <text x="118" y="62" font-family="system-ui" font-size="16" font-weight="700" fill="#7b8cff" opacity="0.7">z</text>
  <text x="130" y="50" font-family="system-ui" font-size="12" font-weight="700" fill="#7b8cff" opacity="0.5">z</text>
  <text x="138" y="40" font-family="system-ui" font-size="9" font-weight="700" fill="#7b8cff" opacity="0.35">z</text>
  <!-- "babycam" text -->
  <text x="90" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="0.08em" fill="#e8e0f0" opacity="0.5">babycam</text>
</svg>
